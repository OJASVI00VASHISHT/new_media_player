[[permission]]
identifier = "allow-nova-player-commands"
description = "Allow access to all Nova Player custom commands"

[permission.commands]
allow = [
  "open_file",
  "play",
  "pause",
  "toggle_play_pause",
  "seek",
  "set_volume",
  "get_position",
  "get_duration",
  "get_state",
  "stop",
  "set_fullscreen",
  "next_video",
  "previous_video",
  "set_speed",
  "get_startup_file",
  "set_mpv_property",
  "set_loop_mode",
  "log_from_frontend",
  "rotate_image_permanently",
  "save_image_edits",
  "get_media_info",
  "get_subtitle_tracks",
  "get_mpv_property",
  "reload_subtitles"
]
